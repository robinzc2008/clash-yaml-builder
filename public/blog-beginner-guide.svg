<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FAFF"/>
      <stop offset="0.5" stop-color="#E6F0FB"/>
      <stop offset="1" stop-color="#D4E4F5"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1120"/>
      <stop offset="1" stop-color="#122746"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F2F7FD" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#24405F" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="198" cy="132" r="140" fill="#8FD3FF" fill-opacity="0.18"/>
  <circle cx="1420" cy="770" r="180" fill="#7DD3FC" fill-opacity="0.16"/>
  <circle cx="1320" cy="140" r="120" fill="#34D399" fill-opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="72" y="56" width="1456" height="188" rx="34" fill="url(#hero)"/>
  </g>

  <g transform="translate(112 96)">
    <rect x="0" y="0" width="84" height="84" rx="26" fill="#0E2039"/>
    <circle cx="42" cy="42" r="28" fill="url(#accent)" fill-opacity="0.18"/>
    <path d="M25 23L42 42L59 23" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 42V65" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M29 66L42 53L55 66" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="220" y="132" fill="white" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="28" font-weight="700">
    clash-yaml-builder 是干嘛的？
  </text>
  <text x="220" y="188" fill="#D8E9FF" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="64" font-weight="800">
    不会写规则，也能一步步做出分流配置
  </text>
  <text x="220" y="230" fill="#B8D4F3" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="28" font-weight="500">
    你只要告诉它“谁走直连、谁走代理、最后导出”，不用自己啃复杂术语。
  </text>

  <g transform="translate(88 296)">
    <rect x="0" y="0" width="1424" height="516" rx="34" fill="rgba(255,255,255,0.56)" stroke="rgba(16,35,63,0.08)"/>

    <g transform="translate(44 40)">
      <rect x="0" y="0" width="300" height="436" rx="28" fill="url(#card)" stroke="rgba(16,35,63,0.08)"/>
      <circle cx="48" cy="54" r="24" fill="#123D69"/>
      <text x="48" y="62" text-anchor="middle" fill="white" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">1</text>
      <text x="88" y="60" fill="#10233F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="34" font-weight="800">先选你要给谁用</text>
      <text x="28" y="118" fill="#3B5C7C" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="500">
        <tspan x="28" dy="0">比如：</tspan>
        <tspan x="28" dy="38">• 家里路由器</tspan>
        <tspan x="28" dy="38">• Windows 电脑</tspan>
        <tspan x="28" dy="38">• Sparkle 客户端</tspan>
      </text>
      <rect x="28" y="260" width="244" height="124" rx="24" fill="#ECF5FF"/>
      <text x="52" y="304" fill="#123D69" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">说人话就是：</text>
      <text x="52" y="338" fill="#35516F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="22" font-weight="500">
        <tspan x="52" dy="0">“这份配置是给哪台设备</tspan>
        <tspan x="52" dy="32">或者哪个软件用的？”</tspan>
      </text>
    </g>

    <g transform="translate(390 40)">
      <rect x="0" y="0" width="300" height="436" rx="28" fill="url(#card)" stroke="rgba(16,35,63,0.08)"/>
      <circle cx="48" cy="54" r="24" fill="#123D69"/>
      <text x="48" y="62" text-anchor="middle" fill="white" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">2</text>
      <text x="88" y="60" fill="#10233F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="34" font-weight="800">再勾你关心的东西</text>
      <text x="28" y="118" fill="#3B5C7C" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="500">
        <tspan x="28" dy="0">比如：</tspan>
        <tspan x="28" dy="38">• ChatGPT / Claude / Gemini</tspan>
        <tspan x="28" dy="38">• YouTube / Netflix</tspan>
        <tspan x="28" dy="38">• Telegram / GitHub</tspan>
        <tspan x="28" dy="38">• 某个自定义网站</tspan>
      </text>
      <rect x="28" y="260" width="244" height="124" rx="24" fill="#ECF5FF"/>
      <text x="52" y="304" fill="#123D69" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">说人话就是：</text>
      <text x="52" y="338" fill="#35516F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="22" font-weight="500">
        <tspan x="52" dy="0">“哪些网站、应用、服务</tspan>
        <tspan x="52" dy="32">我想单独照顾一下？”</tspan>
      </text>
    </g>

    <g transform="translate(736 40)">
      <rect x="0" y="0" width="300" height="436" rx="28" fill="url(#card)" stroke="rgba(16,35,63,0.08)"/>
      <circle cx="48" cy="54" r="24" fill="#123D69"/>
      <text x="48" y="62" text-anchor="middle" fill="white" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">3</text>
      <text x="88" y="60" fill="#10233F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="34" font-weight="800">给它们分配去向</text>
      <text x="28" y="118" fill="#3B5C7C" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="500">
        <tspan x="28" dy="0">你可以直接选：</tspan>
        <tspan x="28" dy="38">• 直连</tspan>
        <tspan x="28" dy="38">• 默认代理</tspan>
        <tspan x="28" dy="38">• AI 专用组</tspan>
        <tspan x="28" dy="38">• 你自己新建的组</tspan>
      </text>
      <rect x="28" y="260" width="244" height="124" rx="24" fill="#ECF5FF"/>
      <text x="52" y="304" fill="#123D69" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">说人话就是：</text>
      <text x="52" y="338" fill="#35516F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="22" font-weight="500">
        <tspan x="52" dy="0">“这个走快线，那个走代理，</tspan>
        <tspan x="52" dy="32">还有的直接本地放行。”</tspan>
      </text>
    </g>

    <g transform="translate(1082 40)">
      <rect x="0" y="0" width="300" height="436" rx="28" fill="url(#card)" stroke="rgba(16,35,63,0.08)"/>
      <circle cx="48" cy="54" r="24" fill="#123D69"/>
      <text x="48" y="62" text-anchor="middle" fill="white" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">4</text>
      <text x="88" y="60" fill="#10233F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="34" font-weight="800">最后一键导出</text>
      <text x="28" y="118" fill="#3B5C7C" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="500">
        <tspan x="28" dy="0">工具会帮你把前面的选择</tspan>
        <tspan x="28" dy="38">整理成能直接用的配置文件。</tspan>
        <tspan x="28" dy="38">你只需要复制、保存、导入。</tspan>
      </text>
      <rect x="28" y="260" width="244" height="124" rx="24" fill="#ECF5FF"/>
      <text x="52" y="304" fill="#123D69" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="700">说人话就是：</text>
      <text x="52" y="338" fill="#35516F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="22" font-weight="500">
        <tspan x="52" dy="0">“不用自己手搓配置，</tspan>
        <tspan x="52" dy="32">点几下就能出结果。”</tspan>
      </text>
    </g>

    <g opacity="0.9">
      <path d="M356 258C370 258 380 268 392 280" stroke="#5C83A9" stroke-width="6" stroke-linecap="round"/>
      <path d="M702 258C716 258 726 268 738 280" stroke="#5C83A9" stroke-width="6" stroke-linecap="round"/>
      <path d="M1048 258C1062 258 1072 268 1084 280" stroke="#5C83A9" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(104 836)">
    <text x="0" y="0" fill="#35516F" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="24" font-weight="600">
      一句话总结：它不是让你学一堆复杂规则，而是把“你的想法”翻译成“能直接用的配置”。
    </text>
  </g>
</svg>
