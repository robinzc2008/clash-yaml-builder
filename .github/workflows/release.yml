name: Build & Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: List build outputs
        run: |
          Get-ChildItem -Recurse "src-tauri/target/release/bundle" | Select-Object FullName, Length
        shell: pwsh

      - name: Upload NSIS installer to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $nsis = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($nsis) {
            $newName = "clash-yaml-builder-${{ github.event.release.tag_name }}-windows-setup.exe"
            Copy-Item $nsis.FullName $newName
            gh release upload "${{ github.event.release.tag_name }}" $newName --clobber
            Write-Host "Uploaded: $newName"
          } else {
            Write-Host "No NSIS installer found"
            exit 1
          }
        shell: pwsh

      - name: Upload portable exe to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = "src-tauri/target/release/clash-yaml-builder.exe"
          if (Test-Path $exe) {
            $newName = "clash-yaml-builder-${{ github.event.release.tag_name }}-windows-portable.exe"
            Copy-Item $exe $newName
            gh release upload "${{ github.event.release.tag_name }}" $newName --clobber
            Write-Host "Uploaded: $newName"
          } else {
            Write-Host "No portable exe found"
          }
        shell: pwsh

      - name: Upload artifacts (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: clash-yaml-builder-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/clash-yaml-builder.exe
